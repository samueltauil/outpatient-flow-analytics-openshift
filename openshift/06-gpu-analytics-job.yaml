# GPU Analytics Job - runs on H100 GPU node
# Triggered after ETL or on-demand for batch analytics
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-analytics
  namespace: central-analytics
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app: gpu-analytics
    app.kubernetes.io/part-of: hls-demo
    app.kubernetes.io/component: analytics
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: gpu-analytics
    spec:
      serviceAccountName: gpu-analytics-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      # Pin to GPU node
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      restartPolicy: OnFailure
      containers:
      - name: analytics
        image: ghcr.io/samueltauil/hls-analytics-gpu:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        args:
        - "--input"
        - "postgresql://$(CENTRAL_DB_USER):$(CENTRAL_DB_PASSWORD)@central-postgres:5432/$(CENTRAL_DB_NAME)"
        - "--output-dir"
        - "/data/analytics"
        env:
        - name: CENTRAL_DB_USER
          valueFrom:
            secretKeyRef:
              name: central-db-credentials
              key: POSTGRES_USER
        - name: CENTRAL_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: central-db-credentials
              key: POSTGRES_PASSWORD
        - name: CENTRAL_DB_NAME
          valueFrom:
            secretKeyRef:
              name: central-db-credentials
              key: POSTGRES_DB
        volumeMounts:
        - name: analytics-output
          mountPath: /data/analytics
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
            nvidia.com/gpu: "1"
          limits:
            memory: "16Gi"
            cpu: "8"
            nvidia.com/gpu: "1"
      volumes:
      - name: analytics-output
        persistentVolumeClaim:
          claimName: analytics-output-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: analytics-output-pvc
  namespace: central-analytics
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/part-of: hls-demo
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
