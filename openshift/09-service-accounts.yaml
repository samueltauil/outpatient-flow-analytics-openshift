# Dedicated ServiceAccounts and minimal RBAC for each component
# Principle of least privilege: each workload gets its own SA
---
# -- edge-collector namespace --
apiVersion: v1
kind: ServiceAccount
metadata:
  name: edge-postgres-sa
  namespace: edge-collector
  labels:
    app.kubernetes.io/part-of: hls-demo
    app.kubernetes.io/component: edge-db
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-generator-sa
  namespace: edge-collector
  labels:
    app.kubernetes.io/part-of: hls-demo
    app.kubernetes.io/component: generator
---
# -- central-analytics namespace --
apiVersion: v1
kind: ServiceAccount
metadata:
  name: central-postgres-sa
  namespace: central-analytics
  labels:
    app.kubernetes.io/part-of: hls-demo
    app.kubernetes.io/component: central-db
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etl-job-sa
  namespace: central-analytics
  labels:
    app.kubernetes.io/part-of: hls-demo
    app.kubernetes.io/component: etl
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-analytics-sa
  namespace: central-analytics
  labels:
    app.kubernetes.io/part-of: hls-demo
    app.kubernetes.io/component: analytics
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: report-viewer-sa
  namespace: central-analytics
  labels:
    app.kubernetes.io/part-of: hls-demo
    app.kubernetes.io/component: viewer
---
# Prevent ServiceAccounts from auto-mounting API tokens (least privilege)
apiVersion: v1
kind: Secret
metadata:
  name: edge-postgres-sa-token
  namespace: edge-collector
  annotations:
    kubernetes.io/service-account.name: edge-postgres-sa
type: kubernetes.io/service-account-token
