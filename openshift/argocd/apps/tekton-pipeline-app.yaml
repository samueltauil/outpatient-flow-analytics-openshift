apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hls-tekton-pipeline
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    gitops.ownedBy: hls-app-of-apps
spec:
  destination:
    namespace: central-analytics
    server: https://kubernetes.default.svc
  project: default
  source:
    path: openshift/apps/tekton-pipeline
    repoURL: https://github.com/samueltauil/outpatient-flow-analytics-openshift.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
