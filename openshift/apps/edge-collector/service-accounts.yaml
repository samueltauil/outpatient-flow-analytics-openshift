# ServiceAccounts for edge-collector namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: edge-postgres-sa
  namespace: edge-collector
  labels:
    app.kubernetes.io/part-of: hls-demo
    app.kubernetes.io/component: edge-db
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-generator-sa
  namespace: edge-collector
  labels:
    app.kubernetes.io/part-of: hls-demo
    app.kubernetes.io/component: generator
---
# DEPRECATED: SA token secrets are no longer needed in Kubernetes 1.24+.
# TokenRequest API is used instead. Kept for backward compatibility.
apiVersion: v1
kind: Secret
metadata:
  name: edge-postgres-sa-token
  namespace: edge-collector
  annotations:
    kubernetes.io/service-account.name: edge-postgres-sa
type: kubernetes.io/service-account-token
