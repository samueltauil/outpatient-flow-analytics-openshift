apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - secrets.yaml
  - service-accounts.yaml
  - ../../02-edge-postgres.yaml
  - ../../04-data-generator-job.yaml
  - db-init-job.yaml
configMapGenerator:
  - name: edge-db-init
    namespace: edge-collector
    files:
      - ../../../db/schema.sql
      - ../../../db/seed.sql
generatorOptions:
  disableNameSuffixHash: true
