# PipelineRun — trigger the full pipeline with custom date range
# Use: oc create -f 05-pipelinerun.yaml -n central-analytics
# Or start from OpenShift Console → Pipelines → outpatient-analytics → Start
# No workspace configuration needed — tasks handle storage internally.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: analytics-run-
  namespace: central-analytics
  labels:
    app.kubernetes.io/part-of: hls-demo
spec:
  pipelineRef:
    name: outpatient-analytics
  taskRunTemplate:
    serviceAccountName: pipeline-sa
  params:
  - name: start-date
    value: "2025-01-06"
  - name: end-date
    value: "2025-03-31"
  taskRunSpecs:
  - pipelineTaskName: gpu-analytics
    podTemplate:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
