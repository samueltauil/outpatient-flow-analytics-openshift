# Tekton Pipeline — end-to-end outpatient analytics
# Accepts start-date and end-date, orchestrates:
#   generate-and-load → etl → gpu-analytics
# No workspaces required — tasks handle storage internally:
#   - generate+load share data via Tekton step volumes (same pod)
#   - gpu-analytics mounts analytics-output-pvc directly
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: outpatient-analytics
  namespace: central-analytics
  labels:
    app.kubernetes.io/part-of: hls-demo
spec:
  params:
  - name: start-date
    type: string
    description: Start date for synthetic data (YYYY-MM-DD)
    default: "2025-01-06"
  - name: end-date
    type: string
    description: End date for synthetic data (YYYY-MM-DD)
    default: "2025-03-31"
  tasks:
  # Stage 1: Generate synthetic data AND load into edge DB
  - name: generate-and-load
    taskRef:
      name: generate-and-load
    params:
    - name: start-date
      value: "$(params.start-date)"
    - name: end-date
      value: "$(params.end-date)"

  # Stage 2: ETL — transfer edge → central
  - name: etl
    runAfter: ["generate-and-load"]
    taskRef:
      name: run-etl

  # Stage 3: GPU analytics on H100
  - name: gpu-analytics
    runAfter: ["etl"]
    taskRef:
      name: run-gpu-analytics
